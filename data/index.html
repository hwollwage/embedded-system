<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Voice Assistant</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f5f5f5;
        }

        button{
            width:100px;
            height:100px;
            border:none;
            border-radius:50%;
            font-size:40px;
            cursor:pointer;
        }

        #status{
            margin-top:20px;
            font-size:20px;
        }

        #result{
            margin-top:10px;
            font-size:24px;
            font-weight:bold;
            color:blue;
        }
    </style>
</head>
<body>

<h1>ESP32 Voice Assistant</h1>
<button id="mic">🎤</button>

<div id="status">Press the microphone</div>

<div id="result"></div>

<script src="script.js"></script>

</body>
</html>
